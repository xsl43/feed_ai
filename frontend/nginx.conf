server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /account/ { proxy_pass http://backend:8080; }
    location /video/ { proxy_pass http://backend:8080; }
    location /like/ { proxy_pass http://backend:8080; }
    location /comment/ { proxy_pass http://backend:8080; }
    location /social/ { proxy_pass http://backend:8080; }
    location /feed/ { proxy_pass http://backend:8080; }
    location /message/ { proxy_pass http://backend:8080; }
    location /notification/ { proxy_pass http://backend:8080; }
    location /ai/ { proxy_pass http://backend:8080; }
    location /media/ { proxy_pass http://backend:8080; }
    location /static/ { proxy_pass http://backend:8080; }
}
